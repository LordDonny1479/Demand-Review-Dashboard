<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demand Review Dashboard</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Demand review</p>
      <h1>Monthly case-volume difference by retailer and MPG</h1>
      <p>Compare 2026 against 2025, convert DRP displays into cases, and review combined MPG-level movement without flavour-level noise.</p>
    </section>

    <section class="controls" aria-label="Dashboard controls">
      <label>Upload CSV <input id="fileInput" type="file" accept=".csv"></label>
      <label>Retailer <select id="retailerFilter"></select></label>
      <label>MPG <select id="mpgFilter"></select></label>
    </section>

    <section id="summaryCards" class="cards" aria-label="Volume summary"></section>
    <p id="updatedAt" class="status"></p>

    <section class="table-wrap">
      <table id="reviewTable">
        <caption>Values show 2026 cases minus 2025 cases for each month.</caption>
        <thead>
          <tr>
            <th>Retailer</th><th>MPG</th><th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th><th>May</th><th>Jun</th><th>Jul</th><th>Aug</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <script src="src/transform.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
